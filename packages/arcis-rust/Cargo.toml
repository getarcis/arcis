# Arcis Rust workspace.
#
# Three crates:
#   * arcis-cli     — the `arcis` binary (clap dispatcher)
#   * arcis-engine  — shared logic (sanitizers, rule matching, version parser).
#                     Empty in Phase A; populated as commands are ported.
#   * arcis-data    — embedded JSON data (threat DB, audit rules, attack
#                     vectors) loaded via include_bytes!(). Same files the
#                     Python CLI reads, no drift possible.
#
# Phase A acceptance: `arcis --version` and `arcis --help` parity-green
# against the Python CLI via `tests/parity/run.py`.

[workspace]
resolver = "2"
members = [
    "crates/arcis-cli",
    "crates/arcis-engine",
    "crates/arcis-data",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Gagan CM <cm.g@northeastern.edu>"]
repository = "https://github.com/Gagancm/arcis"
description = "Native Rust CLI for Arcis security middleware"
rust-version = "1.75"

[workspace.dependencies]
arcis-engine = { path = "crates/arcis-engine", version = "0.1.0" }
arcis-data = { path = "crates/arcis-data", version = "0.1.0" }

clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
# `preserve_order` flips serde_json's internal Map from BTreeMap to
# IndexMap so we can emit JSON with explicit field ordering. Required
# for byte-equal parity with Python's json.dumps (which preserves dict
# insertion order on 3.7+).
serde_json = { version = "1.0", features = ["preserve_order"] }
anyhow = "1.0"
thiserror = "2.0"
regex = "1.10"

[profile.release]
# Smaller, faster binary. The tradeoffs (longer compile, no incremental in
# release) are fine for a tool we ship.
lto = "thin"
codegen-units = 1
strip = "symbols"
