[package]
name = "arcis-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Native Rust CLI binary for Arcis security middleware. Distributes via npm as @arcis/cli."

# The crate name is `arcis-cli` for cargo, but the produced binary is named
# `arcis` so users invoke `arcis scan` / `arcis audit` / `arcis sca`.
[[bin]]
name = "arcis"
path = "src/main.rs"

[dependencies]
arcis-engine = { workspace = true }
arcis-data = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
serde_json = { workspace = true }
# Async runtime for `arcis scan`. Runtime is constructed once in scan.rs
# and dropped after the run; the rest of the CLI stays synchronous.
tokio = { workspace = true }
# Native terminal-size detection (ioctl on Unix, GetConsoleScreenBufferInfo
# on Windows). Required so the no-args welcome screen picks the right
# branch on PowerShell, which never exports COLUMNS.
terminal_size = "0.4"
# Interactive REPL (cli-bugs.md Part B / improvements.md §1.5). Drops
# users into a full-screen rounded TUI on bare `arcis`. Backend is
# crossterm (ratatui's default).
ratatui = { workspace = true }
crossterm = { workspace = true }

[dev-dependencies]
# End-to-end CLI tests under `tests/` need scratch dirs for fixtures
# and baseline files. Already present in `arcis-engine`'s dev-deps;
# adding here for the new `tests/audit_baseline.rs` integration suite
# (cli-audit.md item 9b).
tempfile = "3.10"
