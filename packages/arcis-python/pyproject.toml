[build-system]
requires = ["setuptools>=77.0.3", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arcis"
version = "1.5.3"
description = "Inside-the-app security middleware for Python. One install protects FastAPI, Flask, and Django against XSS, SQL injection, CSRF, SSRF, HPP, prompt injection, bot traffic, rate limiting, and 20+ more attack types. Includes prompt-injection signature library, LLM token-budget middleware, and a 646-pattern bot corpus with consistent API across the Node and Go SDKs. The CLI ships separately at npm install -g @arcis/cli."
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    {name = "Gagan CM", email = "gagancm@users.noreply.github.com"}
]
keywords = ["security", "xss", "sql-injection", "nosql-injection", "rate-limiting", "flask", "fastapi", "django", "ssrf", "open-redirect", "cors", "sanitize", "middleware", "web-security", "input-validation", "command-injection", "path-traversal"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: Flask",
    "Framework :: FastAPI",
    "Framework :: Django",
    "Topic :: Security",
    "Topic :: Internet :: WWW/HTTP :: WSGI :: Middleware",
]
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
flask = ["flask>=2.0.0"]
fastapi = ["fastapi>=0.68.0", "starlette>=0.14.0"]
django = ["django>=3.2"]
redis = ["redis>=4.0.0"]
telemetry = ["httpx>=0.24.0"]
interactive = ["questionary>=2.0.0"]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-benchmark>=4.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "flask>=2.0.0",
    "fastapi>=0.68.0",
    "httpx>=0.24.0",
]

[project.scripts]
# Re-introduce `arcis` on PATH after the v1.5.0 strip. This is a thin
# shim that either delegates to the real Rust CLI (when @arcis/cli is
# installed via npm) or prints a friendly install hint + SDK self-test.
# See arcis/cli_shim.py for the rationale.
arcis = "arcis.cli_shim:main"

[project.urls]
Homepage = "https://github.com/GagancM/arcis"
Documentation = "https://github.com/Gagancm/arcis/wiki"
Repository = "https://github.com/GagancM/arcis"
Issues = "https://github.com/GagancM/arcis/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["arcis*"]

[tool.setuptools.package-data]
arcis = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint.per-file-ignores]
# __init__.py and explicit re-export shims expose the public API by
# importing names from internal modules. Ruff cannot tell those imports
# from genuine unused ones, so silence F401 on those files.
"**/__init__.py" = ["F401"]
"arcis/sanitizer.py" = ["F401"]
"arcis/django.py" = ["F401"]
"arcis/fastapi.py" = ["F401"]
# Test files commonly use lambdas as throwaway hooks, leave a captured
# response object for a planned later assertion, and conditionally import
# inside a try/except guard — those forms aren't worth rewriting.
"tests/**" = ["E731", "F841", "E402"]

[tool.mypy]
python_version = "3.9"
strict = true
