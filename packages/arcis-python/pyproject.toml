[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arcis"
version = "1.4.3"
description = "Zero-dependency security middleware for Python. Protects against XSS, SQL injection, CSRF, SSRF, HPP, rate limiting, bot detection, and 15+ more attack types. Works with Flask, FastAPI, and Django."
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "Gagan CM", email = "gagancm@users.noreply.github.com"}
]
keywords = ["security", "xss", "sql-injection", "nosql-injection", "rate-limiting", "flask", "fastapi", "django", "ssrf", "open-redirect", "cors", "sanitize", "middleware", "web-security", "input-validation", "command-injection", "path-traversal"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Framework :: Flask",
    "Framework :: FastAPI",
    "Framework :: Django",
    "Topic :: Security",
    "Topic :: Internet :: WWW/HTTP :: WSGI :: Middleware",
]
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
flask = ["flask>=2.0.0"]
fastapi = ["fastapi>=0.68.0", "starlette>=0.14.0"]
django = ["django>=3.2"]
redis = ["redis>=4.0.0"]
telemetry = ["httpx>=0.24.0"]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "pytest-asyncio>=0.21.0",
    "pytest-benchmark>=4.0.0",
    "black>=23.0.0",
    "mypy>=1.0.0",
    "flask>=2.0.0",
    "fastapi>=0.68.0",
    "httpx>=0.24.0",
]

[project.scripts]
arcis = "arcis.cli:main"

[project.urls]
Homepage = "https://github.com/GagancM/arcis"
Documentation = "https://github.com/Gagancm/arcis/wiki"
Repository = "https://github.com/GagancM/arcis"
Issues = "https://github.com/GagancM/arcis/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["arcis*"]

[tool.setuptools.package-data]
arcis = ["data/*.json"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.black]
line-length = 100
target-version = ["py39", "py310", "py311", "py312"]

[tool.mypy]
python_version = "3.9"
strict = true
