<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta http-equiv="refresh" content="0; url=https://arcis-website.pages.dev/">
  <link rel="canonical" href="https://arcis-website.pages.dev/">
  <title>Arcis has moved to arcis-website.pages.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #e4e5e0;
      color: #141413;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .mark {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background-color: #00996D;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 140 140'><g fill='%23ffffff'><ellipse cx='70' cy='36' rx='7' ry='26' transform='rotate(-8 70 70)'/><ellipse cx='70' cy='38' rx='7' ry='24' transform='rotate(48 70 70)'/><ellipse cx='70' cy='40' rx='7' ry='22' transform='rotate(104 70 70)'/><ellipse cx='70' cy='36' rx='7' ry='26' transform='rotate(158 70 70)'/><ellipse cx='70' cy='42' rx='7' ry='20' transform='rotate(208 70 70)'/><ellipse cx='70' cy='38' rx='7' ry='24' transform='rotate(258 70 70)'/><ellipse cx='70' cy='40' rx='7' ry='22' transform='rotate(308 70 70)'/></g></svg>");
      background-repeat: no-repeat;
      background-size: 75%;
      background-position: center;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    p {
      color: #474a45;
      font-size: 1rem;
      line-height: 1.55;
      max-width: 480px;
      margin-bottom: 1.25rem;
    }
    a {
      color: #00996D;
      font-weight: 500;
      text-decoration: none;
    }
    a:hover { color: #007a57; text-decoration: underline; }
    .note {
      font-size: 0.85rem;
      color: #747a72;
    }
  </style>
</head>
<body>
  <div class="mark" aria-hidden="true"></div>
  <h1>Arcis has moved.</h1>
  <p>The website is now hosted at <a href="https://arcis-website.pages.dev/">arcis-website.pages.dev</a>. Redirecting you now…</p>
  <p class="note">If your browser does not redirect automatically, click the link above.</p>
  <script>
    (function () {
      var dest = 'https://arcis-website.pages.dev';
      // GitHub Pages serves this site under /arcis/, so strip that prefix
      // before forwarding so deep links land at the correct path on the new host.
      var path = location.pathname.replace(/^\/arcis/, '');
      if (path === '' || path === '/') path = '/';
      location.replace(dest + path + location.search + location.hash);
    })();
  </script>
</body>
</html>
