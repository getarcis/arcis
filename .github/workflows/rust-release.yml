name: Rust CLI Release

# Phase C1 of `documents/plans/rust-cli.md`. Builds cross-arch binaries
# from the Rust workspace and uploads them to a GitHub Release. The
# distribution wrapper (`@arcis/cli` on npm, Phase C2) downloads the
# matching archive at install time.
#
# Trigger: `cli-v*` tag pushes (e.g. `cli-v0.2.0`). The `cli-` prefix
# keeps Rust binary releases distinct from the Python `v*` tag stream
# during the soft-deprecation window. Once the cutover lands and the
# Python CLI has been removed (Phase C3), this can move to plain `v*`
# tags. `workflow_dispatch` is also accepted so we can sanity-check the
# build pipeline before the first real release — that path uploads
# artifacts only (no GitHub Release is created).
#
# Targets (matches `documents/plans/rust-cli.md` Phase C1):
#   * x86_64-unknown-linux-musl   — static, runs on Alpine + scratch
#   * aarch64-unknown-linux-musl  — ARM64 Linux, static
#   * aarch64-apple-darwin        — macOS arm64
#   * x86_64-pc-windows-msvc      — Windows x64

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v prefix (e.g. 1.0.1)."
        required: true
        type: string
      publish:
        description: "Create the cli-v* tag + GitHub release + npm publish. Leave false for a dry-run (artifacts only)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
            archive: tar.gz
            binary: arcis
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
            archive: tar.gz
            binary: arcis
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false
            archive: tar.gz
            binary: arcis
          - target: x86_64-apple-darwin
            # macos-latest is Apple Silicon. We cross-compile to
            # x86_64-apple-darwin from it because GitHub's macos-13 (the
            # explicit Intel runner) is being phased out — runner
            # availability has collapsed and jobs queue for hours
            # without ever being picked up. Cross-compile on macOS works
            # because Rust ships pre-built x86_64 std libs and the
            # bundled macOS SDK is universal. ring + rustls (our
            # cryptographic crates) support macOS cross-compile.
            os: macos-latest
            use-cross: false
            archive: tar.gz
            binary: arcis
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use-cross: false
            archive: zip
            binary: arcis.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/arcis-rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # dtolnay/rust-toolchain@stable is intentionally unpinned — see the
      # comment in `rust.yml` for the full reasoning. `targets:` adds the
      # cross-compile target without needing a separate `rustup target add`.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/arcis-rust/target
          key: cargo-release-${{ matrix.target }}-${{ hashFiles('packages/arcis-rust/**/Cargo.toml', 'packages/arcis-rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-release-${{ matrix.target }}-
            cargo-${{ matrix.os }}-

      # `cross` provides musl Docker images preconfigured with the right
      # C cross-toolchains. Installing via `cargo install --locked` is
      # slower than a SHA-pinned third-party action, but keeps the action
      # surface (and the audit-pinning burden) minimal.
      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked --version 0.2.5

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin arcis
          else
            cargo build --release --target ${{ matrix.target }} --bin arcis
          fi

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            v="${{ inputs.version }}"
          else
            # tag is `cli-vX.Y.Z` -> X.Y.Z
            v="${GITHUB_REF_NAME#cli-v}"
          fi
          if [ -z "$v" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"

      - name: Package artifact
        id: pkg
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          target="${{ matrix.target }}"
          name="arcis-${version}-${target}"
          mkdir -p "dist/${name}"
          cp "target/${target}/release/${{ matrix.binary }}" "dist/${name}/"
          # Best-effort: include LICENSE + README if present at the repo root.
          # Distribution layout is just the binary; these are nice-to-have.
          cp ../../LICENSE "dist/${name}/" 2>/dev/null || true
          cp ../../README.md "dist/${name}/" 2>/dev/null || true
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            # 7z is preinstalled on windows-latest and ubuntu-latest.
            7z a -mx=9 "${name}.zip" "${name}" >/dev/null
            file="${name}.zip"
          else
            tar -czf "${name}.tar.gz" "${name}"
            file="${name}.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${file}" > "${file}.sha256"
          else
            shasum -a 256 "${file}" > "${file}.sha256"
          fi
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "file=${file}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: ${{ steps.pkg.outputs.name }}
          path: |
            packages/arcis-rust/dist/${{ steps.pkg.outputs.file }}
            packages/arcis-rust/dist/${{ steps.pkg.outputs.file }}.sha256
          if-no-files-found: error
          retention-days: 7

  # Runs on either a cli-v* tag push OR a workflow_dispatch with
  # publish=true. workflow_dispatch with publish=false (the default)
  # stops at artifact upload — that's the dry-run path.
  #
  # The unified-release model: publish.yml on push-to-main detects a
  # CLI version bump and calls this workflow with publish=true via
  # `gh workflow run`, which CREATES the cli-v* tag from inside the
  # release job before cutting the GitHub release.
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # Need write token + full history so we can create + push the
        # cli-v* tag from inside this job when invoked via dispatch.
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
            tag="cli-v${version}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#cli-v}"
          fi
          echo "tag=${tag}" >> $GITHUB_OUTPUT
          echo "version=${version}" >> $GITHUB_OUTPUT

      - name: Create + push cli-v* tag (dispatch path only)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Skip if tag already exists; publish.yml's skip-if-exists
          # guard should prevent a re-trigger, but defend in depth.
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists locally, skipping"
          elif git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "tag ${tag} already exists on origin, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${tag}"
            git push origin "${tag}"
            echo "pushed tag ${tag}"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist

      - name: Flatten + aggregate SHA256SUMS
        shell: bash
        run: |
          cd dist
          # Each per-target artifact landed in its own subdir; flatten.
          find . -mindepth 2 -name 'arcis-*.tar.gz' -exec mv {} . \;
          find . -mindepth 2 -name 'arcis-*.zip' -exec mv {} . \;
          # Combined SHA256SUMS file pinned at the release root.
          : > SHA256SUMS
          for f in arcis-*.tar.gz arcis-*.zip; do
            if [ -e "$f" ]; then
              sha256sum "$f" >> SHA256SUMS
            fi
          done
          # Drop the now-redundant per-file checksums.
          find . -mindepth 2 -name '*.sha256' -delete
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS
          echo "=== Files ==="
          ls -la

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          version="${{ steps.tag.outputs.version }}"
          # Skip if a release for this tag already exists. Lets the
          # workflow be re-runnable without erroring on
          # "already_exists".
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "release ${tag} already exists, skipping create"
          else
            gh release create "${tag}" \
              --title "Arcis CLI ${version}" \
              --generate-notes \
              dist/arcis-*.tar.gz dist/arcis-*.zip dist/SHA256SUMS
          fi

  # Publish the npm wrapper package (@arcis/cli) after the GitHub Release
  # is live. Postinstall in the wrapper fetches the platform binary from
  # the GitHub release we just created + SHA-256 verifies it; we must not
  # publish to npm before the release exists or the first user to install
  # gets a 404 from the postinstall script.
  #
  # Uses NPM_TOKEN from repo secrets — a granular access token scoped to
  # @arcis/cli. No local-machine publishing for v1.0.0+. The credential
  # lives only in GitHub Actions secrets; rotating it is one click.
  #
  # Fires on tag push OR workflow_dispatch with publish=true. The
  # workflow_dispatch path is what publish.yml uses to auto-publish CLI
  # when its version is bumped on main.
  publish-npm:
    name: Publish @arcis/cli to npm
    needs: release
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify wrapper version matches the tag
        shell: bash
        working-directory: packages/arcis-cli-npm
        run: |
          # Tag comes from either GITHUB_REF_NAME (push) or inputs (dispatch).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_version="${{ inputs.version }}"
          else
            tag_version="${GITHUB_REF_NAME#cli-v}"
          fi
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag is cli-v${tag_version} but package.json says ${pkg_version}"
            echo "Bump package.json before re-tagging."
            exit 1
          fi
          echo "ok: tag and package.json both report ${pkg_version}"

      - name: Wait for GitHub release to be reachable
        shell: bash
        run: |
          # The release was created by the preceding job; give the GitHub
          # CDN a moment to propagate so the wrapper's postinstall (which
          # downloads from releases/download/...) can resolve. 5s is
          # enough in practice; bail with a clear error if not.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="cli-v${{ inputs.version }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          for i in 1 2 3 4 5; do
            if curl -fsSLI "https://github.com/Gagancm/arcis/releases/tag/${tag}" >/dev/null; then
              echo "release page reachable after ${i} attempt(s)"
              break
            fi
            sleep 3
          done

      - name: Publish to npm
        working-directory: packages/arcis-cli-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
