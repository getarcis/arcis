name: CI

on:
  pull_request:
    branches: [nwl]

jobs:
  node:
    name: Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/arcis-node/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      # Build before tests — tests/cli/arcis.test.ts invokes the built
      # dispatcher (dist/cli/arcis.mjs) as a subprocess and beforeAll
      # aborts if the artifact is missing.
      - run: npm run build
      - run: npm test -- --run

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-go
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false
      - run: go mod tidy
      - run: go test -v -race ./...
