name: Rust CLI

# Cost-tier validation: PR-only, Linux-only.
# Catches ~95% of compile-time and test issues at minimal runner cost.
# Cross-platform (linux/macos/windows + arm64) release validation runs
# in `rust-release.yml` on `cli-v*` tag pushes — that's where binary
# correctness across OSes truly matters. macOS minutes cost 10x Linux
# and Windows 2x; running them on every PR is overkill for dev validation.

on:
  pull_request:
    branches: [nwl]
    paths:
      - "packages/arcis-rust/**"
      - ".github/workflows/rust.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: arcis-linux-x86_64
            binary: arcis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/arcis-rust
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # dtolnay/rust-toolchain's @stable branch hardcodes the toolchain
      # selection; SHA-pinning the action breaks that, so we use the @stable
      # ref directly. The action itself is widely audited; this is the
      # ecosystem-standard pattern. Components are passed explicitly so
      # clippy and rustfmt are guaranteed available regardless of how
      # GitHub's hosted-runner Rust install is configured.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/arcis-rust/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('packages/arcis-rust/**/Cargo.toml', 'packages/arcis-rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --release
      - run: cargo build --workspace --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: packages/arcis-rust/target/release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 7
