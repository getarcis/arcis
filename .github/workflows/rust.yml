name: Rust CLI

# Phase A of `documents/plans/rust-cli.md` — bootstrap the Rust workspace
# and the Python<->Rust parity harness. Runs on every push to a Rust-CLI
# branch and on PRs targeting the integration branches.
#
# Two stages: build (matrix across linux/macos/windows) uploads the
# release binary; parity (linux only) downloads the linux artifact and
# diffs its output against the Python CLI for each fixture in
# packages/arcis-rust/tests/parity/fixtures/.

on:
  pull_request:
    branches: [nwl, "feat/v1.5"]
    paths:
      - "packages/arcis-rust/**"
      - "packages/arcis-python/arcis/data/**"
      - ".github/workflows/rust.yml"
  push:
    branches:
      - "feat/rust-cli"
      - "feat/rust-cli/**"

jobs:
  # ─── Build matrix ────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: arcis-linux-x86_64
            binary: arcis
          - os: macos-latest
            artifact: arcis-macos-arm64
            binary: arcis
          - os: windows-latest
            artifact: arcis-windows-x86_64
            binary: arcis.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: packages/arcis-rust
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # dtolnay/rust-toolchain's @stable branch hardcodes the toolchain
      # selection; SHA-pinning the action breaks that, so we use the @stable
      # ref directly. The action itself is widely audited; this is the
      # ecosystem-standard pattern. Components are passed explicitly so
      # clippy and rustfmt are guaranteed available regardless of how
      # GitHub's hosted-runner Rust install is configured.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/arcis-rust/target
          key: cargo-${{ matrix.os }}-${{ hashFiles('packages/arcis-rust/**/Cargo.toml', 'packages/arcis-rust/**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ matrix.os }}-

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --release
      - run: cargo build --workspace --release

      - name: Upload binary artifact
        uses: actions/upload-artifact@de65e23aa2b7e23d713bb51fbfcb6d502f8667d8 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: packages/arcis-rust/target/release/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 7

  # ─── Parity job ──────────────────────────────────────────────────────
  # Linux-only; running parity on every OS would triple the test cost
  # without changing the answer. Cross-platform output-shape divergence
  # is rare and would surface in the macOS / Windows build steps anyway.
  parity:
    name: Parity (Python vs Rust)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Python CLI in editable mode
        working-directory: packages/arcis-python
        run: pip install -e .

      - name: Download Rust binary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: arcis-linux-x86_64
          path: ${{ runner.temp }}/rust-bin

      - name: Make Rust binary executable
        run: chmod +x "$RUNNER_TEMP/rust-bin/arcis"

      - name: Run parity harness
        working-directory: packages/arcis-rust
        run: python tests/parity/run.py --rust-bin "$RUNNER_TEMP/rust-bin/arcis"
