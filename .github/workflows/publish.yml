name: Publish

on:
  push:
    branches: [main]

jobs:
  publish-node:
    name: Publish Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-node
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/arcis-node/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check if version already published
        id: check-npm
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "@arcis/node@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} already published to npm, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        if: steps.check-npm.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-mcp:
    name: Publish MCP
    runs-on: ubuntu-latest
    needs: [publish-node]
    defaults:
      run:
        working-directory: packages/arcis-mcp
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/arcis-mcp/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check if version already published
        id: check-npm
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "@arcis/mcp@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} already published to npm, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        if: steps.check-npm.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: Publish Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-python
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Check if version already published
        id: check-pypi
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if pip index versions arcis 2>/dev/null | grep -q "${PACKAGE_VERSION}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} already published to PyPI, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish to PyPI
        if: steps.check-pypi.outputs.skip != 'true'
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # @arcis/cli is a Rust binary distributed via npm. Building it requires
  # a multi-platform matrix (Linux x64/arm64, macOS x64/arm64, Windows x64)
  # which lives in `.github/workflows/rust-release.yml`. This job acts as
  # the dispatcher: if packages/arcis-cli-npm/package.json declares a
  # version that is NOT yet on npm, it fires rust-release.yml via
  # `gh workflow run` with publish=true. rust-release.yml then builds the
  # binaries, creates the cli-v* tag + GitHub release, and publishes to
  # npm — all via the same NPM_TOKEN secret used by publish-node above.
  #
  # Mirrors the publish-node / publish-python pattern: read manifest,
  # check registry, no-op if already published, trigger otherwise.
  publish-cli:
    name: Publish CLI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # required for `gh workflow run` to dispatch
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Check if CLI version already published
        id: check-cli
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/arcis-cli-npm/package.json').version")
          echo "version=${PACKAGE_VERSION}" >> $GITHUB_OUTPUT
          if npm view "@arcis/cli@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} already on npm, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} not on npm, will dispatch rust-release.yml"
          fi

      - name: Dispatch rust-release.yml with publish=true
        if: steps.check-cli.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ steps.check-cli.outputs.version }}"
          gh workflow run rust-release.yml \
            --ref main \
            --field "version=${v}" \
            --field "publish=true"
          echo "dispatched rust-release.yml for cli-v${v}"
          echo "monitor: https://github.com/${GITHUB_REPOSITORY}/actions/workflows/rust-release.yml"

  # Note: Go SDK previously lived in this monorepo and was tagged
  # alongside Node + Python releases. It moved to its own repo at
  # github.com/getarcis/arcis-go because the monorepo layout placed
  # go.mod at a subdirectory which the Go module proxy could not
  # resolve. arcis-go now releases independently from that repo.

  # Unified release notes for Node + Python publishes. Reads the
  # version from @arcis/node (Node + Python keep their version lines
  # in lockstep) and creates a GitHub Release at v<version>. Tag is
  # created here too so users can reference the monorepo release point.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-node, publish-python]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Determine version
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/arcis-node/package.json').version")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version is v${VERSION}"
      - name: Push tag if it doesn't already exist
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "tag ${TAG} already on origin, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "pushed tag ${TAG}"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.version }}"
          NOTES_FILE="release-notes/${TAG}.md"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${TAG}"
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "release ${TAG} already exists, skipping"
          elif [ -f "${NOTES_FILE}" ]; then
            # Curated, public-safe notes committed in the release PR.
            echo "using curated notes from ${NOTES_FILE}"
            gh release create "${TAG}" --title "Arcis ${TAG}" --notes-file "${NOTES_FILE}"
            echo "created GitHub Release at ${REPO_URL}"
          else
            # Fallback: auto-generate from PR titles. Noisy; prefer a
            # committed release-notes/${TAG}.md per the README in that dir.
            echo "no ${NOTES_FILE}; falling back to auto-generated notes"
            gh release create "${TAG}" --title "Arcis ${TAG}" --generate-notes
            echo "created GitHub Release at ${REPO_URL}"
          fi
