name: Publish

on:
  push:
    branches: [main]

jobs:
  publish-node:
    name: Publish Node.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-node
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: packages/arcis-node/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Check if version already published
        id: check-npm
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "@arcis/node@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} already published to npm — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        if: steps.check-npm.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-python:
    name: Publish Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/arcis-python
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Check if version already published
        id: check-pypi
        run: |
          PACKAGE_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if pip index versions arcis 2>/dev/null | grep -q "${PACKAGE_VERSION}"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "v${PACKAGE_VERSION} already published to PyPI — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Publish to PyPI
        if: steps.check-pypi.outputs.skip != 'true'
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
