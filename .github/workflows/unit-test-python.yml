name: Unit tests — Python

on:
  workflow_call:

jobs:
  python:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.9 dropped: EOL October 2025; arcis/telemetry/client.py
        # instantiates asyncio.Queue at sync __init__, which calls
        # get_event_loop() and raises in 3.9 outside a running loop.
        # Follow-up: refactor client.py:343 to create the queue lazily.
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
    defaults:
      run:
        working-directory: packages/arcis-python
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,redis]"
      - name: Run tests with retry on flake
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: cd packages/arcis-python && pytest
